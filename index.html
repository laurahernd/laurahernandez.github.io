<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Blog Personal</title>
    <style>
        /* Estilos básicos */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background-color: #f4f4f9;
        }
        header {
            border-bottom: 2px solid #333;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
        }
        article {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        h1, h2 { color: #2c3e50; }
        .date { color: #7f8c8d; font-size: 0.9rem; }
        footer {
            text-align: center;
            font-size: 0.8rem;
            margin-top: 3rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bienvenidos a mi Blog</h1>
        <p>Compartiendo mis ideas sobre tecnología y vida.</p>
    </header>

    <main>
        <article>
            <h2>Mi primera entrada: ¡Hola Mundo!</h2>
            <p class="date">Publicado el 2 de marzo de 2026</p>
            <p> Hola. </p>
        </article>

    </main>

    <footer>
        <p>&copy; 2026 - Creado por Laura Hernández </p>
    </footer>

</body>
</html>
